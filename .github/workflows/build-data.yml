name: build-data

on:
  workflow_dispatch:
  schedule:
    # Weekly, Sundays at 06:00 UTC. Picks up upstream revisions.
    - cron: "0 6 * * 0"

permissions:
  contents: write
  pull-requests: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Rebuild data from upstream
        run: npm run build

      - name: Validate rebuilt data
        run: npm run validate

      - name: Open PR if data changed
        uses: peter-evans/create-pull-request@v6
        with:
          branch: bot/weekly-refresh
          commit-message: "chore(data): weekly upstream refresh"
          title: "Weekly data refresh"
          body: |
            Automated rebuild of `data/` from upstream sources.

            Review the diff — SILSO and GFZ periodically revise historical
            values; if row counts shrink or checksums change for definitive
            rows, investigate before merging.
          labels: automated, data-refresh
          add-paths: |
            data/**
